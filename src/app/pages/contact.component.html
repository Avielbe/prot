<section class="min-h-screen flex flex-col justify-center items-center gap-4">
    <h2 class="text-3xl font-semibold">Get in Touch</h2>
    <form class="w-full max-w-sm flex flex-col gap-4">
        <input class="border p-3 rounded" placeholder="Your name" />
        <input class="border p-3 rounded" placeholder="Email address" />
        <textarea class="border p-3 rounded h-32" placeholder="Message"></textarea>

            Send
        </button>
    </form>
</section>
